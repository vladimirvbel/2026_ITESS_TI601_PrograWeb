<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <header>
      <hgroup>
        <h1>Portal de Usuario</h1>
        <h2>Login</h2>
      </hgroup>
    </header>

    <form action="bienvenido.html" method="GET">
      <fieldset>
        <legend>Datos de Acceso</legend>
        <label for="correo_login">Correo:</label>
        <input type="email" id="correo_login" name="correo" required />
        <br /><br />
        <label for="pass_login">Contraseña:</label>
        <input type="password" id="pass_login" name="password" required />
        <br /><br />
        <button type="submit">Entrar</button>
      </fieldset>
    </form>
  </body>
</html>
